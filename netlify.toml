[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

# Prevent browsers caching stale JS/HTML
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Triggered every 5 min — self-throttles to 5 min (peak IST) or 30 min (off-peak)
[functions."live-checker"]
  schedule = "*/5 * * * *"

# Processes one ended stream per run — fetches transcript, runs Groq, writes to stream-log
[functions."auto-analyze"]
  schedule = "*/10 * * * *"
